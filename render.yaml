services:
  - type: web
    name: cricinsight-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    pythonVersion: 3.12.0
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CRICAPI_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cricinsight-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: AWS_CLOUDWATCH_LOG_GROUP
        value: /cricinsight/backend
      - key: CRICSHEET_S3_BUCKET
        value: cricinsight-data-802531653822

databases:
  - name: cricinsight-db
    databaseName: cricinsight
    user: cricinsight
    plan: free
