services:
  - type: web
    name: cricinsight-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CRICAPI_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cricinsight-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: AWS_CLOUDWATCH_LOG_GROUP
        value: /cricinsight/backend
      - key: CRICSHEET_S3_BUCKET
        value: cricinsight-data-802531653822

databases:
  - name: cricinsight-db
    databaseName: cricinsight
    user: cricinsight
    plan: free
